image: python:3

before_script:
  - pip install mkdocs
  - cd T6_rapport

build:
  stage: build
  script:
    - mkdocs build --strict --verbose --site-dir ../mkdocs_site
  artifacts:
    paths:
      - mkdocs_site
  rules:
    - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH

pages:
  stage: deploy
  script:
    - mkdocs build --strict --verbose --site-dir ../public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
