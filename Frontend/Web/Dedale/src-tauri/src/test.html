<!DOCTYPE html>
<html>
<head>
    <title>Test WebSocket</title>
</head>
<body>
<script>
const ws = new WebSocket("ws://192.168.1.100:9001");

ws.onopen = () => {
    console.log("Connecté !");
    ws.send("Message de test");
};

ws.onmessage = (e) => {
    console.log("Réponse serveur :", e.data);
};

ws.onclose = () => console.log("Déconnecté");
</script>
</body>
</html>
