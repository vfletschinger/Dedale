image: rust:latest

variables:
  PROJECT_PATH: "Frontend/Web/Dedale/src-tauri"
  CARGO_HOME: $CI_PROJECT_DIR/$PROJECT_PATH/.cargo
  DEBIAN_FRONTEND: noninteractive

stages:
  - quality
  - build
  - test

cache:
  key: global-cache
  paths:
    - $PROJECT_PATH/.cargo/
    - $PROJECT_PATH
    - $PROJECT_PATH/node_modules/
    - $PROJECT_PATH/webdriver/webdriverio/node_modules/

# --- JOB 1 : QUALITÉ DU CODE ---
check_quality:
  stage: quality
  before_script:
    # 1. On installe Node.js
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -

    # 2. IMPORTANT : On installe les dépendances système pour Tauri (C'est ce qui manquait !)
    - apt-get update && apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libwebkit2gtk-4.0-dev librsvg2-dev pkg-config libssl-dev curl nodejs

    # 3. On installe les outils Rust
    - rustup component add clippy rustfmt

    # 4. On crée le dossier de rapport
    - mkdir -p $RUST_PATH/reports

  script:
    # --- PARTIE 1 : RUST ---
    - cd $RUST_PATH

    # Formatage
    - cargo fmt --all -- --check > reports/raw_diff.txt 2>&1 || true

    # Génération HTML
    - |
      echo "<!DOCTYPE html><html><head><meta charset='utf-8'><title>Rapport Rustfmt</title>" > reports/format_report.html
      echo "<style>body{font-family:'Consolas',monospace;background:#1e1e1e;color:#d4d4d4;padding:20px}h1{color:#fff}.add{color:#b5cea8;bg:rgba(46,160,67,0.15)}.del{color:#ce9178;bg:rgba(248,81,73,0.15)}.line{display:block;white-space:pre}</style></head><body>" >> reports/format_report.html

    - cargo clippy -- -D warnings > reports/clippy_report.txt 2>&1

    # Arrêt si formatage KO
    # - if [ $FAIL -eq 1 ]; then exit 1; fi

    # --- PARTIE 2 : REACT ---
    - cd ..
    - npm ci
    - npm run lint

  artifacts:
    when: always
    paths:
      - $RUST_PATH/reports/format_report.html
      - $RUST_PATH/reports/raw_diff.txt
      - $RUST_PATH/reports/clippy_report.txt
    expire_in: 1 week
# --- JOB 2 : BUILD ---
build_app:
  stage: build
  needs: ["check_quality"]
  before_script:
    - apt-get update && apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libwebkit2gtk-4.0-dev
  script:
    - cd $PROJECT_PATH
    - cargo build --release
  artifacts:
    paths:
      - $PROJECT_PATH/target/release/dedale
      - $PROJECT_PATH/target/release/bundle/
    expire_in: 1 hour

# --- JOB 3 : TESTS FONCTIONNELS ---
test_e2e:
  stage: test
  needs: ["build_app"]
  before_script:
    - apt-get update && apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libwebkit2gtk-4.0-dev webkit2gtk-driver xvfb curl
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - apt-get install -y nodejs
  script:
    - cd $PROJECT_PATH

    - cargo install tauri-driver

    - cd webdriver/webdriverio
    - npm ci

    # Lancement des tests via NPM
    - xvfb-run npm run test
