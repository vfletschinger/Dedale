image: rust:latest

variables:
  PROJECT_PATH: "Frontend/Web/Dedale/src-tauri"
  WEB_PATH: "Frontend/Web/Dedale"
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  DEBIAN_FRONTEND: noninteractive
  PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
  npm_config_cache: $CI_PROJECT_DIR/.npm
  DEPS_MARKER: /tmp/deps_installed

stages:
  - quality
  - build
  - test

# Cache global pour Cargo et npm pour eviter d'installer pour chaque stage
cache:
  key: "${CI_COMMIT_REF_SLUG}-v1"
  paths:
    - .cargo/
    - .npm/
    - $PROJECT_PATH/target/
    - $PROJECT_PATH/node_modules/
    - $PROJECT_PATH/webdriver/webdriverio/node_modules/
  policy: pull-push

.install_dependencies: &install_dependencies
  - |
    apt-get update -qq
    apt-get install -y --no-install-recommends \
      curl \
      wget \
      libgtk-3-dev \
      libgdk-pixbuf-xlib-2.0-dev \
      libcairo2-dev \
      libpango1.0-dev \
      libatk1.0-dev \
      libgdk-pixbuf-2.0-0 \
      libsoup-3.0-dev \
      libjavascriptcoregtk-4.1-dev \
      libwebkit2gtk-4.1-dev \
      libayatana-appindicator3-dev \
      librsvg2-dev \
      patchelf \
      pkg-config \
      xdg-utils \
      file
    if ! command -v node &> /dev/null; then
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      apt-get install -y nodejs
    fi
    rm -rf /var/lib/apt/lists/*

check_quality:
  stage: quality
  cache:
    - key: "${CI_COMMIT_REF_SLUG}-cargo-v1"
      paths:
        - .cargo/
        - $PROJECT_PATH/target/
      policy: pull-push
    - key: "${CI_COMMIT_REF_SLUG}-npm-v1"
      paths:
        - .npm/
        - $PROJECT_PATH/node_modules/
      policy: pull-push
  before_script:
    - *install_dependencies
    - rustup component add clippy rustfmt
  script:
    - cd $PROJECT_PATH

    # 1. Qualité RUST
    - mkdir -p reports
    - cargo fmt --all -- --check 2>&1 | tee -a reports/cargoFmt_report.txt
    - cargo clippy --all-targets --all-features -- -D warnings 2>&1 | tee -a reports/clippy_report.txt 

    # 2. Qualité REACT/TypeScript
    - cd $CI_PROJECT_DIR/$WEB_PATH
    - npm ci --prefer-offline
    - npm run lint 2>&1 | tee -a $CI_PROJECT_DIR/$PROJECT_PATH/reports/lint_report.txt

  artifacts:
    when: always
    paths:
      - $PROJECT_PATH/reports/
    expire_in: 1 week
  allow_failure: true

# --- JOB 2 : BUILD ---
build_app:
  stage: build
  needs: ["check_quality"]
  cache:
    - key: "${CI_COMMIT_REF_SLUG}-cargo-v1"
      paths:
        - .cargo/
        - $PROJECT_PATH/target/
      policy: pull-push
    - key: "${CI_COMMIT_REF_SLUG}-npm-v1"
      paths:
        - .npm/
        - $PROJECT_PATH/node_modules/
      policy: pull-push
  before_script:
    - *install_dependencies
  script:
    - cd $PROJECT_PATH

    # Vérification de l'environnement
    - echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
    - echo "=== Packages GTK/WebKit disponibles ==="
    - pkg-config --list-all | grep -E "(gtk|gdk|webkit)" || true
    - echo "=== Versions ==="
    - pkg-config --modversion gtk+-3.0 || echo "gtk+-3.0 non trouvé"
    - pkg-config --modversion gdk-3.0 || echo "gdk-3.0 non trouvé"
    - pkg-config --modversion webkit2gtk-4.1 || echo "webkit2gtk-4.1 non trouvé"
    - pkg-config --modversion webkit2gtk-4.0 || echo "webkit2gtk-4.0 non trouvé"

    # Installation des dépendances frontend (utilise le cache)
    - npm ci --prefer-offline

    # Build avec Tauri CLI
    - npm run tauri build -- --verbose

  artifacts:
    paths:
      - $PROJECT_PATH/src-tauri/target/release/dedale
      - $PROJECT_PATH/src-tauri/target/release/bundle/
    expire_in: 1 day

# --- JOB 3 : TESTS FONCTIONNELS ---
test_e2e:
  stage: test
  needs: ["build_app"]
  cache:
    - key: "${CI_COMMIT_REF_SLUG}-cargo-v1"
      paths:
        - .cargo/
        - $PROJECT_PATH/target/
      policy: pull
    - key: "${CI_COMMIT_REF_SLUG}-npm-v1"
      paths:
        - .npm/
        - $PROJECT_PATH/node_modules/
        - $PROJECT_PATH/webdriver/webdriverio/node_modules/
      policy: pull-push
  before_script:
    - *install_dependencies
    - apt-get update -qq && apt-get install -y --no-install-recommends xvfb xauth
  script:
    - cd $PROJECT_PATH
    - |
      if [ -f tsconfig.json ]; then
        # Backup du tsconfig original
        cp tsconfig.json tsconfig.json.backup
        # Modifier pour permettre les variables non utilisées
        sed -i 's/"noUnusedLocals": true/"noUnusedLocals": false/g' tsconfig.json
        # Si la ligne n'existe pas, on ne fait rien (le build passera quand même)
      fi

    # Installer tauri-driver et ajouter au PATH
    - cargo install tauri-driver --locked
    - export PATH="$CARGO_HOME/bin:$PATH"
    - which tauri-driver
    - tauri-driver --version

    # Tests E2E
    - cd webdriver/webdriverio
    - npm ci --prefer-offline

    # Lancement des tests avec Xvfb (avec PATH mis à jour)
    - export PATH="$CARGO_HOME/bin:$PATH"
    - xvfb-run -a -s "-screen 0 1920x1080x24" npm run test

  artifacts:
    when: always
    paths:
      - $PROJECT_PATH/webdriver/webdriverio/reports/
      - $PROJECT_PATH/webdriver/webdriverio/screenshots/
      - $PROJECT_PATH/webdriver/webdriverio/logs/
    expire_in: 1 week
  allow_failure: true

