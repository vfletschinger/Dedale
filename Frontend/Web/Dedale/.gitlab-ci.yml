image: ivangabriele/tauri:debian-bookworm-22

variables:
  PROJECT_PATH: "Frontend/Web/Dedale/src-tauri"
  WEB_PATH: "Frontend/Web/Dedale"
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  npm_config_cache: $CI_PROJECT_DIR/.npm

stages:
  - quality
  - build
  - test
  - release
  - deploy

.cache_cargo: &cache_cargo
  key: "${CI_COMMIT_REF_SLUG}-cargo"
  paths:
    - .cargo/registry/
    - .cargo/git/
    - $PROJECT_PATH/target/
  policy: pull-push

# Cache npm - évite de re-télécharger les packages Node.js
.cache_npm: &cache_npm
  key: "${CI_COMMIT_REF_SLUG}-npm"
  paths:
    - .npm/
    - $WEB_PATH/node_modules/
  policy: pull-push

# Job de qualité Rust
check_rust_quality:
  stage: quality
  rules:
    - if: $CI_COMMIT_BRANCH != "main"
  cache:
    - <<: *cache_cargo
  before_script:
    - rustup component add rustfmt clippy
  script:
    - cd $PROJECT_PATH
    - mkdir -p reports
    - cargo fmt --all -- --check 2>&1 | tee reports/cargoFmt_report.txt
    - cargo clippy --all-targets --all-features -- -D warnings 2>&1 | tee reports/clippy_report.txt
  after_script:
    - cd $PROJECT_PATH
    - rm -rf target/debug/incremental target/debug/.fingerprint
    - find target -name "*.lock" -type f -delete 2>/dev/null || true
  artifacts:
    when: always
    paths:
      - $PROJECT_PATH/reports/
    expire_in: 1 week
  allow_failure: false

# Job de lint frontend
lint_frontend:
  stage: quality
  image: node:22-slim
  rules:
    - if: $CI_COMMIT_BRANCH != "main"
  cache:
    - <<: *cache_npm
  script:
    - cd $WEB_PATH
    - npm ci --prefer-offline
    - mkdir -p $CI_PROJECT_DIR/$PROJECT_PATH/reports
    - npm run lint 2>&1 | tee $CI_PROJECT_DIR/$PROJECT_PATH/reports/lint_report.txt

  artifacts:
    when: always
    paths:
      - $PROJECT_PATH/reports/
    expire_in: 1 week
  allow_failure: false

# --- JOB 2 & 3 : BUILD AND TEST E2E ---
test_e2e:
  stage: test
  # rules:
  #   - if: $CI_COMMIT_BRANCH == "web" || $CI_COMMIT_BRANCH == "develop"
  needs:
    - job: check_rust_quality
    - job: lint_frontend
  cache:
    - <<: *cache_npm
    - <<: *cache_cargo
    - key: "${CI_COMMIT_REF_SLUG}-webdriver"
      paths:
        - $PROJECT_PATH/webdriver/webdriverio/node_modules/
      policy: pull-push
  script:
    # Build for E2E tests
    - cd $WEB_PATH
    - npm ci --prefer-offline
    - npm run tauri build -- --no-bundle --verbose

    # Run E2E tests
    - cd $CI_PROJECT_DIR/$PROJECT_PATH
    - which tauri-driver
    - cd webdriver/webdriverio
    - npm ci --prefer-offline
    - mkdir -p reports screenshots logs
    - xvfb-run -a -s "-screen 0 1920x1080x24" npm run test
  after_script:
    - cd $PROJECT_PATH
    - rm -rf target/debug/incremental target/debug/.fingerprint
    - find target -name "*.lock" -type f -delete 2>/dev/null || true
  artifacts:
    when: always
    paths:
      - $PROJECT_PATH/webdriver/webdriverio/reports/
      - $PROJECT_PATH/webdriver/webdriverio/screenshots/
      - $PROJECT_PATH/webdriver/webdriverio/logs/
    expire_in: 1 week
  allow_failure: false

