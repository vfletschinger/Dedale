image: rust:latest

variables:
  PROJECT_PATH: "Frontend/Web/Dedale/src-tauri"
  CARGO_HOME: $CI_PROJECT_DIR/$PROJECT_PATH/.cargo
  DEBIAN_FRONTEND: noninteractive
  PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig

stages:
  - quality
  - build
  - test

cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
    - $PROJECT_PATH/.cargo/
    - $PROJECT_PATH/target/
    - $PROJECT_PATH/node_modules/
    - $PROJECT_PATH/webdriver/webdriverio/node_modules/

# --- DÉPENDANCES COMMUNES ---
.install_dependencies: &install_dependencies
  - apt-get update
  - apt-get install -y
    curl
    wget
    libgtk-3-dev
    libgdk-pixbuf-xlib-2.0-dev
    libcairo2-dev
    libpango1.0-dev
    libatk1.0-dev
    libgdk-pixbuf-2.0-0
    libsoup-3.0-dev
    libjavascriptcoregtk-4.1-dev
    libwebkit2gtk-4.1-dev
    libayatana-appindicator3-dev
    librsvg2-dev
    patchelf
    pkg-config
  - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
  - apt-get install -y nodejs

# --- JOB 1 : QUALITÉ DU CODE ---
check_quality:
  stage: quality
  before_script:
    - *install_dependencies
    - rustup component add clippy rustfmt
  script:
    - cd $PROJECT_PATH

    # 1. Qualité RUST
    - mkdir -p reports
    - echo "=== Vérification du formatage Rust ===" | tee reports/cargoFmt_report.txt
    - cargo fmt --all -- --check 2>&1 | tee -a reports/cargoFmt_report.txt || echo "AVERTISSEMENT - Formatage non conforme"

    - echo "=== Analyse Clippy ===" | tee reports/clippy_report.txt
    - cargo clippy --all-targets --all-features -- -D warnings 2>&1 | tee -a reports/clippy_report.txt || echo "AVERTISSEMENT - Clippy a détecté des problèmes"

    # 2. Qualité REACT/TypeScript
    - echo "=== Installation des dépendances npm ===" | tee reports/npm_install.txt
    - npm ci 2>&1 | tee -a reports/npm_install.txt

    # Vérification si le script lint existe
    - echo "=== Analyse ESLint ===" | tee reports/lint_report.txt
    - |
      if npm run | grep -q "lint"; then
        npm run lint 2>&1 | tee -a reports/lint_report.txt || echo "AVERTISSEMENT - ESLint a détecté des problèmes"
      else
        echo "Script 'lint' non trouvé dans package.json - ignoré" | tee -a reports/lint_report.txt
      fi

  artifacts:
    when: always
    paths:
      - $PROJECT_PATH/reports/
    expire_in: 1 week
  allow_failure: true

# --- JOB 2 : BUILD ---
build_app:
  stage: build
  needs: ["check_quality"]
  before_script:
    - *install_dependencies
  script:
    - cd $PROJECT_PATH

    # Vérification de l'environnement
    - echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
    - echo "=== Packages GTK/WebKit disponibles ==="
    - pkg-config --list-all | grep -E "(gtk|gdk|webkit)" || true
    - echo "=== Versions ==="
    - pkg-config --modversion gtk+-3.0 || echo "gtk+-3.0 non trouvé"
    - pkg-config --modversion gdk-3.0 || echo "gdk-3.0 non trouvé"
    - pkg-config --modversion webkit2gtk-4.1 || echo "webkit2gtk-4.1 non trouvé"
    - pkg-config --modversion webkit2gtk-4.0 || echo "webkit2gtk-4.0 non trouvé"

    # Installation des dépendances frontend
    - npm ci

    # Build avec Tauri CLI
    - npm run tauri build -- --verbose

  artifacts:
    paths:
      - $PROJECT_PATH/src-tauri/target/release/dedale
      - $PROJECT_PATH/src-tauri/target/release/bundle/
    expire_in: 1 day

# --- JOB 3 : TESTS FONCTIONNELS ---
test_e2e:
  stage: test
  needs: ["build_app"]
  before_script:
    - *install_dependencies
    - apt-get install -y xvfb
  script:
    - cd $PROJECT_PATH

    # Installation de tauri-driver
    - cargo install tauri-driver --locked || echo "tauri-driver déjà installé"

    # Vérification de l'installation
    - which tauri-driver || echo "tauri-driver non trouvé dans PATH"
    - tauri-driver --version || true

    # Tests E2E
    - cd webdriver/webdriverio
    - npm ci

    # Lancement des tests avec Xvfb
    - xvfb-run -a -s "-screen 0 1920x1080x24" npm run test

  artifacts:
    when: always
    paths:
      - $PROJECT_PATH/webdriver/webdriverio/reports/
      - $PROJECT_PATH/webdriver/webdriverio/screenshots/
      - $PROJECT_PATH/webdriver/webdriverio/logs/
    expire_in: 1 week
  allow_failure: true
