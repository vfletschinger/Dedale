# --- JOB 4 : BUILD WINDOWS ---
build_app_windows:
  stage: release
  # rules:
  #   - if: $CI_COMMIT_BRANCH == "main"
  cache:
    # Cache séparé pour Windows
    - key: "${CI_COMMIT_REF_SLUG}-cargo-windows"
      paths:
        - .cargo/registry/index/
        - .cargo/registry/cache/
        - .cargo/git/db/
      policy: pull-push
    - <<: *cache_npm
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends nsis
    - apt-get install -y --no-install-recommends lld llvm clang
    - rustup target add x86_64-pc-windows-msvc
    - cargo install --locked cargo-xwin
    # Ajouter le chemin de cargo-xwin au PATH
    - export PATH="$CARGO_HOME/bin:$PATH"
  script:
    - cd $WEB_PATH
    - export PATH="$CARGO_HOME/bin:$PATH"
    - npm ci --prefer-offline

    - npm run tauri build -- --runner cargo-xwin --target x86_64-pc-windows-msvc --verbose
  after_script:
    - rm -rf $PROJECT_PATH/target/x86_64-pc-windows-msvc/release/incremental
    - find $PROJECT_PATH/target -name "*.lock" -type f -delete 2>/dev/null || true
  artifacts:
    paths:
      - $PROJECT_PATH/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
    expire_in: 4 weeks
    name: "dedale-windows-installer-$CI_COMMIT_SHORT_SHA"

# --- UPLOAD TO PACKAGE REGISTRY ---
upload_package:
  stage: deploy
  image: curlimages/curl:latest
  # rules:
  #   - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - job: build_app_windows
      artifacts: true
  script:
    - |
      INSTALLER_PATH=$(find $PROJECT_PATH/target/x86_64-pc-windows-msvc/release/bundle/nsis/ -name "*.exe" | head -n 1)
      INSTALLER_NAME="dedale-installer-v1.0.$CI_PIPELINE_IID.exe"
      echo "Uploading $INSTALLER_PATH as $INSTALLER_NAME"

      curl --header "JOB-TOKEN: $CI_JOB_TOKEN" \
           --upload-file "$INSTALLER_PATH" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/dedale/1.0.$CI_PIPELINE_IID/$INSTALLER_NAME"

# --- GITLAB RELEASE ---
release_windows:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  # rules:
  #   - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - job: build_app_windows
      artifacts: true
    - job: upload_package
  script:
    - echo "Creating release for build $CI_PIPELINE_IID"
  release:
    tag_name: "v1.0.$CI_PIPELINE_IID"
    name: "Dedale v1.0.$CI_PIPELINE_IID"
    description: |
      ## 📦 Version 1.0.$CI_PIPELINE_IID

      **Build:** $CI_PIPELINE_IID
      **Commit:** $CI_COMMIT_SHORT_SHA
      **Date:** $CI_COMMIT_TIMESTAMP

      ### Téléchargement
      Téléchargez l'installateur Windows ci-dessous.

      ### Configuration requise
      - Windows 10/11 (64-bit)

    assets:
      links:
        - name: "Dedale-Windows-Installer.exe"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/dedale/1.0.$CI_PIPELINE_IID/dedale-installer-v1.0.$CI_PIPELINE_IID.exe"
          link_type: "package"
