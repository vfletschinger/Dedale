image: rust:latest

variables:
  PROJECT_PATH: "Frontend/Web/Dedale/src-tauri"
  CARGO_HOME: $CI_PROJECT_DIR/$PROJECT_PATH/.cargo
  DEBIAN_FRONTEND: noninteractive

stages:
  - quality
  - build
  - test

cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
    - $PROJECT_PATH/.cargo/
    - $PROJECT_PATH/target/
    - $PROJECT_PATH/node_modules/
    - $PROJECT_PATH/webdriver/webdriverio/node_modules/

# --- JOB 1 : QUALITÉ DU CODE ---
check_quality:
  stage: quality
  before_script:
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - apt-get install -y nodejs
    - rustup component add clippy rustfmt
  script:
    - cd $PROJECT_PATH

    # 1. Qualité RUST
    - mkdir -p reports
    - cargo fmt --all -- --check 2>&1 | tee reports/cargoFmt_report.txt || true
    - cargo clippy --all-targets --all-features -- -D warnings 2>&1 | tee reports/clippy_report.txt || true

    # 2. Qualité REACT
    - npm ci
    - npm run lint 2>&1 | tee reports/lint_report.txt || true
  artifacts:
    when: always
    paths:
      - $PROJECT_PATH/reports/
    expire_in: 1 week
  allow_failure: false

# --- JOB 2 : BUILD ---
build_app:
  stage: build
  needs: ["check_quality"]
  before_script:
    - apt-get update && apt-get install -y
      libgtk-3-dev
      libayatana-appindicator3-dev
      libwebkit2gtk-4.0-dev
      curl
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - apt-get install -y nodejs
  script:
    - cd $PROJECT_PATH

    # Installation des dépendances frontend
    - npm ci

    # Build Tauri
    - npm run tauri build
  artifacts:
    paths:
      - $PROJECT_PATH/src-tauri/target/release/dedale
      - $PROJECT_PATH/src-tauri/target/release/bundle/
    expire_in: 1 day

# --- JOB 3 : TESTS FONCTIONNELS ---
test_e2e:
  stage: test
  needs: ["build_app"]
  before_script:
    - apt-get update && apt-get install -y
      libgtk-3-dev
      libayatana-appindicator3-dev
      libwebkit2gtk-4.0-dev
      webkit2gtk-driver
      xvfb
      curl
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - apt-get install -y nodejs
  script:
    - cd $PROJECT_PATH

    # Installation de tauri-driver (avec cache pour éviter recompilation)
    - cargo install tauri-driver --locked || true

    # Tests E2E
    - cd webdriver/webdriverio
    - npm ci
    - xvfb-run -a npm run test
  artifacts:
    when: always
    paths:
      - $PROJECT_PATH/webdriver/webdriverio/reports/
      - $PROJECT_PATH/webdriver/webdriverio/screenshots/
    expire_in: 1 week
  allow_failure: true
