image: rust:latest

variables:
  PROJECT_PATH: "Frontend/Web/Dedale/src-tauri"
  CARGO_HOME: $CI_PROJECT_DIR/$PROJECT_PATH/.cargo
  DEBIAN_FRONTEND: noninteractive

stages:
  - quality
  - build
  - test

cache:
  key: global-cache
  paths:
    - $PROJECT_PATH/.cargo/
    - $PROJECT_PATH
    - $PROJECT_PATH/node_modules/
    - $PROJECT_PATH/webdriver/webdriverio/node_modules/

# --- JOB 1 : QUALITÉ DU CODE ---
check_quality:
  stage: quality
  before_script:
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - apt-get install -y nodejs
    - rustup component add clippy rustfmt
  script:
    - cd $PROJECT_PATH

    # 1. Qualité RUST
    - mkdir -p reports
    - cargo fmt --all -- --check > reports/cargoFmt_repport.txt || true
    - cargo clippy -- -D warnings > reports/clippy_report.txt 2>&1

    # 2. Qualité REACT
    - npm ci
    - npm run lint
  artifacts:
    when: always
    paths:
      - $PROJECT_PATH/reports/rustfmt_diff.txt
      - $PROJECT_PATH/reports/clippy_report.txt
    expire_in: 1 week
# --- JOB 2 : BUILD ---
build_app:
  stage: build
  needs: ["check_quality"]
  before_script:
    - apt-get update && apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libwebkit2gtk-4.0-dev
  script:
    - cd $PROJECT_PATH
    - cargo build --release
  artifacts:
    paths:
      - $PROJECT_PATH/target/release/dedale
      - $PROJECT_PATH/target/release/bundle/
    expire_in: 1 hour

# --- JOB 3 : TESTS FONCTIONNELS ---
test_e2e:
  stage: test
  needs: ["build_app"]
  before_script:
    - apt-get update && apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libwebkit2gtk-4.0-dev webkit2gtk-driver xvfb curl
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - apt-get install -y nodejs
  script:
    - cd $PROJECT_PATH

    - cargo install tauri-driver

    - cd webdriver/webdriverio
    - npm ci

    # Lancement des tests via NPM
    - xvfb-run npm run test
